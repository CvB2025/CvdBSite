<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Picker</title>
  <script src="https://cdn.jsdelivr.net/npm/@cognigy/xapp-sdk@latest/dist/index.umd.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a6fdb, #7b4fc4, #e05fa0, #f7a1c4, #1a6fdb);
      background-size: 300% 300%;
      animation: gradientShift 6s ease infinite;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 36px 32px 28px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card-header {
      text-align: center;
    }

    .card-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .card-header p {
      font-size: 0.875rem;
      color: #666;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      letter-spacing: 0.03em;
    }

    input[type="date"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d0d5e0;
      border-radius: 10px;
      font-size: 1rem;
      color: #1a1a2e;
      background: #f8f9fc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    input[type="date"]:focus {
      border-color: #1a6fdb;
      box-shadow: 0 0 0 3px rgba(26, 111, 219, 0.15);
      background: #fff;
    }

    .selected-display {
      font-size: 0.85rem;
      color: #1a6fdb;
      font-weight: 500;
      min-height: 1.2em;
      text-align: center;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #1a6fdb;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(26, 111, 219, 0.35);
    }

    .submit-btn:hover:not(:disabled) {
      background: #155bb5;
      box-shadow: 0 6px 20px rgba(26, 111, 219, 0.45);
    }

    .submit-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .submit-btn:disabled {
      background: #a0b8e8;
      box-shadow: none;
      cursor: not-allowed;
    }

    .error-msg {
      font-size: 0.8rem;
      color: #d0342c;
      text-align: center;
      min-height: 1em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>Select a Date</h1>
      <p>Please choose a date to continue</p>
    </div>

    <div class="field">
      <label for="datePicker">Date</label>
      <input type="date" id="datePicker" />
    </div>

    <div class="selected-display" id="selectedDisplay"></div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="submit-btn" id="submitBtn" disabled>Confirm Date</button>
  </div>

  <script>
    const dateInput   = document.getElementById('datePicker');
    const submitBtn   = document.getElementById('submitBtn');
    const display     = document.getElementById('selectedDisplay');
    const errorMsg    = document.getElementById('errorMsg');

    // Initialise Cognigy XApp SDK
    let sdk;
    try {
      sdk = new CognigyXAppSDK();
      sdk.init();
    } catch (e) {
      // Running outside Cognigy — graceful fallback for local dev
      console.warn('XApp SDK not available:', e.message);
    }

    function formatDateDisplay(value) {
      if (!value) return '';
      const [y, m, d] = value.split('-');
      const date = new Date(y, m - 1, d);
      return date.toLocaleDateString(undefined, {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    dateInput.addEventListener('change', () => {
      const val = dateInput.value;
      errorMsg.textContent = '';

      if (val) {
        submitBtn.disabled = false;
        display.textContent = formatDateDisplay(val);
      } else {
        submitBtn.disabled = true;
        display.textContent = '';
      }
    });

    submitBtn.addEventListener('click', () => {
      const val = dateInput.value;

      if (!val) {
        errorMsg.textContent = 'Please select a date before confirming.';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting…';

      const payload = {
        selectedDate: val,
        formattedDate: formatDateDisplay(val)
      };

      if (sdk) {
        sdk.submit(payload);
      } else {
        // Dev fallback
        console.log('Submitted payload:', payload);
        setTimeout(() => {
          submitBtn.textContent = 'Submitted ✓';
        }, 500);
      }
    });
  </script>
</body>
</html>
